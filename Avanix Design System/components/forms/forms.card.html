<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-body); background: var(--bg-page-grad); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Switch, Checkbox } = window.AvanixDesignSystem_a5b4a8;
const Mail = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>;
function Demo() {
  return (
    <div className="grid">
      <div className="col">
        <Input label="Email" placeholder="ban@email.com" iconLeft={<Mail/>} defaultValue="nguyen@avanix.ai" />
        <Input label="Mật khẩu" type="password" helper="Tối thiểu 8 ký tự" defaultValue="secret123" />
        <Input label="Tên hiển thị" error="Tên đã tồn tại" defaultValue="nix" />
      </div>
      <div className="col">
        <Switch defaultChecked label="Bật tự động hoá (n8n)" />
        <Switch label="Thông báo qua email" />
        <Switch size="sm" defaultChecked label="Chế độ tối" />
        <div style={{height:6}} />
        <Checkbox defaultChecked label="Đồng ý nhận bản tin" />
        <Checkbox label="Lưu workflow vào Vault" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
