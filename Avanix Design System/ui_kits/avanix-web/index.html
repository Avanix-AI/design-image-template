<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Avanix — AI Education & Automation</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; background: var(--bg-page); font-family: var(--font-body); }
  @media (max-width: 860px) {
    .av-hero-grid, .av-pillars, .av-dash-grid { grid-template-columns: 1fr !important; }
    .av-stats { grid-template-columns: repeat(2,1fr) !important; }
    .av-navlinks { display: none !important; }
    .av-dash-side { position: static !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Landing.jsx"></script>
<script type="text/babel" src="Courses.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel">
function App() {
  const [route, setRoute] = React.useState("landing");
  const dark = route === "landing";
  const screens = { landing: window.Landing, courses: window.Courses, dashboard: window.Dashboard };
  const Screen = screens[route] || window.Landing;
  return (
    <div style={{ minHeight: "100vh", background: dark ? "#06091F" : "var(--bg-page)" }}>
      <window.Nav route={route} setRoute={setRoute} tone={dark ? "dark" : "light"} />
      <Screen setRoute={setRoute} />
    </div>
  );
}
// Wait for babel-loaded screen scripts to register on window.
function boot() {
  if (window.Landing && window.Courses && window.Dashboard && window.Nav && window.AvanixDesignSystem_a5b4a8) {
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  } else {
    setTimeout(boot, 40);
  }
}
boot();
</script>
</body>
</html>
