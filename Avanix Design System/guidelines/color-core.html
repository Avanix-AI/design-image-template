<!-- @dsCard group="Colors" viewport="700x150" name="Brand core" subtitle="Navy · Electric Blue · White — the three official colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page-grad); padding: 22px; font-family: var(--font-body); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 14px; height: 108px; display: flex; flex-direction: column; justify-content: flex-end; box-shadow: var(--shadow-sm); }
  .name { font-weight: 700; font-size: 14px; }
  .hex { font-family: var(--font-mono); font-size: 12px; opacity: .8; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--av-navy);color:#fff;">
      <div class="name">Navy</div><div class="hex">#0B1240</div>
    </div>
    <div class="sw" style="background:var(--av-blue);color:#fff;">
      <div class="name">Electric Blue</div><div class="hex">#0A5BFF</div>
    </div>
    <div class="sw" style="background:#fff;color:var(--av-navy);border:1px solid var(--border);">
      <div class="name">White</div><div class="hex">#FFFFFF</div>
    </div>
  </div>
</body>
</html>
