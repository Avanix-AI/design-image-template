<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page-grad); padding: 22px; font-family: var(--font-body); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; height: 92px; border-radius: var(--radius-sm); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-shadow: var(--shadow-xs); }
  .t { font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--av-blue-700);color:#fff;"><span class="t">700</span></div>
    <div class="sw" style="background:var(--av-blue-600);color:#fff;"><span class="t">600</span></div>
    <div class="sw" style="background:var(--av-blue-500);color:#fff;"><span class="t">500</span></div>
    <div class="sw" style="background:var(--av-blue-400);color:#fff;"><span class="t">400</span></div>
    <div class="sw" style="background:var(--av-blue-300);color:var(--av-navy);"><span class="t">300</span></div>
    <div class="sw" style="background:var(--av-blue-200);color:var(--av-navy);"><span class="t">200</span></div>
    <div class="sw" style="background:var(--av-blue-100);color:var(--av-navy);"><span class="t">100</span></div>
    <div class="sw" style="background:var(--av-blue-50);color:var(--av-navy);border:1px solid var(--border);"><span class="t">50</span></div>
  </div>
</body>
</html>
