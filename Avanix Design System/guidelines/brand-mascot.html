<!-- @dsCard group="Brand" viewport="700x300" name="Nix — the mascot" subtitle="Caped penguin in 3D glossy 'liquid glass' style; key poses" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); min-height: 300px;
    background: radial-gradient(70% 90% at 50% 10%, rgba(10,91,255,.16), transparent 60%), var(--bg-page-grad);
    display: flex; align-items: flex-end; justify-content: center; gap: 18px; padding: 18px 24px 0; }
  .fig { display: flex; flex-direction: column; align-items: center; }
  .fig img { height: 230px; object-fit: contain; filter: drop-shadow(0 18px 22px rgba(11,18,64,.22)); }
  .fig.sm img { height: 180px; }
  .cap { font-size: 11px; font-weight: 700; color: var(--av-slate-500); letter-spacing: .04em; padding-bottom: 6px; }
</style>
</head>
<body>
  <div class="fig sm"><img src="../assets/mascot/nix-three-quarter.png" alt="Nix 3/4"><span class="cap">3/4</span></div>
  <div class="fig"><img src="../assets/mascot/nix-hero.png" alt="Nix hero"><span class="cap">HERO</span></div>
  <div class="fig sm"><img src="../assets/mascot/nix-front.png" alt="Nix front"><span class="cap">FRONT</span></div>
</body>
</html>
