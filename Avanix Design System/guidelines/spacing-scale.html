<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page-grad); padding: 24px 28px; font-family: var(--font-body); }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--av-blue); border-radius: 4px; height: 14px; }
  .t { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px"></div><span class="t">4</span></div>
    <div class="item"><div class="bar" style="width:8px"></div><span class="t">8</span></div>
    <div class="item"><div class="bar" style="width:12px"></div><span class="t">12</span></div>
    <div class="item"><div class="bar" style="width:16px"></div><span class="t">16</span></div>
    <div class="item"><div class="bar" style="width:24px"></div><span class="t">24</span></div>
    <div class="item"><div class="bar" style="width:32px"></div><span class="t">32</span></div>
    <div class="item"><div class="bar" style="width:48px"></div><span class="t">48</span></div>
    <div class="item"><div class="bar" style="width:64px"></div><span class="t">64</span></div>
  </div>
</body>
</html>
