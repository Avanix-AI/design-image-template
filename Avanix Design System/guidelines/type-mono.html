<!-- @dsCard group="Type" viewport="700x150" name="Mono & eyebrow" subtitle="JetBrains Mono for code/metrics · uppercase eyebrow labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page-grad); padding: 22px 28px; font-family: var(--font-body); }
  .eye { font-size: 12px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--av-blue); }
  .mono { font-family: var(--font-mono); font-size: 15px; color: var(--av-navy); margin-top: 12px; }
  .mono .c { color: var(--av-blue); }
  .mono .g { color: var(--av-slate-500); }
  .tag { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <div class="eye">Workflow · Automation</div>
  <div class="mono"><span class="g">$</span> npx <span class="c">avanix</span> run agent.flow.json</div>
  <div class="tag">JetBrains Mono · 400/500/700 · eyebrow Jakarta 700 · tracking .14em</div>
</body>
</html>
