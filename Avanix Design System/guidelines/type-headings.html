<!-- @dsCard group="Type" viewport="700x210" name="Heading scale" subtitle="H1–H4 in Plus Jakarta Sans Bold, snug tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page-grad); padding: 22px 28px; font-family: var(--font-body); }
  .r { display: flex; align-items: baseline; gap: 14px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .r:last-child { border: 0; }
  h1,h2,h3,h4 { margin: 0; color: var(--av-navy); }
  h1 { font-size: 40px; } h2 { font-size: 30px; } h3 { font-size: 24px; } h4 { font-size: 20px; }
  .tag { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); white-space: nowrap; }
</style>
</head>
<body>
  <div class="r"><h1>Heading one</h1><span class="tag">H1 · 700</span></div>
  <div class="r"><h2>Heading two</h2><span class="tag">H2 · 700</span></div>
  <div class="r"><h3>Heading three</h3><span class="tag">H3 · 700</span></div>
  <div class="r"><h4>Heading four</h4><span class="tag">H4 · 700</span></div>
</body>
</html>
