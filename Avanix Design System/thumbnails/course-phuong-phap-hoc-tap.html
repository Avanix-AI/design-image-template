<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  .thumb {
    position: relative;
    width: 1460px;
    height: 752px;
    overflow: hidden;
    font-family: var(--font-body);
    background:
      radial-gradient(70% 120% at 82% 8%, #1a2a7a 0%, transparent 55%),
      radial-gradient(90% 130% at 88% 30%, rgba(46,114,255,0.45) 0%, transparent 50%),
      radial-gradient(120% 120% at 20% 100%, #0B1240 0%, #06091F 70%);
  }
  /* faint grid texture */
  .grid-tex {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(80% 80% at 30% 40%, #000 0%, transparent 75%);
    -webkit-mask-image: radial-gradient(80% 80% at 30% 40%, #000 0%, transparent 75%);
  }
  /* dot particles */
  .dot { position: absolute; border-radius: 999px; background: var(--av-blue-300); box-shadow: 0 0 10px var(--av-blue-400); }

  .pad { position: absolute; inset: 0; padding: 72px 80px; box-sizing: border-box; display: flex; flex-direction: column; }

  /* top brand row */
  .brandrow { display: flex; align-items: center; gap: 14px; }
  .brandrow img { height: 38px; }
  .brand-sep { width: 1px; height: 26px; background: rgba(255,255,255,0.18); }
  .module-tag {
    font-size: 15px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--av-blue-300);
  }

  /* main title block */
  .center { flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 760px; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px; align-self: flex-start;
    padding: 9px 18px; border-radius: 999px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.16);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 28px; white-space: nowrap;
  }
  .eyebrow .pip { width: 9px; height: 9px; border-radius: 999px; background: var(--av-blue-400); box-shadow: 0 0 0 4px rgba(92,144,255,0.25); }
  h1 {
    font-family: var(--font-display); font-weight: 800;
    font-size: 104px; line-height: 1.04; letter-spacing: -0.03em;
    color: #fff; margin: 0;
  }
  h1 .accent { color: var(--av-blue-400); }
  .sub { font-size: 24px; line-height: 1.5; color: var(--av-slate-300); margin: 26px 0 0; max-width: 600px; }
  .chiprow { display: flex; gap: 12px; margin-top: 38px; }
  .chip {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 11px 20px; border-radius: 999px; font-size: 17px; font-weight: 600;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16);
    color: #fff; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); white-space: nowrap;
  }
  .chip .ic { color: var(--av-blue-400); display: flex; }

  /* ---- liquid-glass illustration (right) ---- */
  .art { position: absolute; right: -10px; top: 50%; transform: translateY(-50%); width: 660px; height: 660px; }
  .art .glow-pod { position: absolute; left: 50%; top: 48%; transform: translate(-50%,-50%); width: 460px; height: 460px; border-radius: 50%; background: radial-gradient(closest-side, rgba(46,114,255,0.5), transparent 72%); filter: blur(22px); }
  /* tilted glass orbit rings */
  .orbit { position: absolute; left: 50%; top: 48%; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.20);
    box-shadow: inset 0 0 50px rgba(92,144,255,0.14), 0 0 36px -12px rgba(10,91,255,0.5); }
  .orbit.o1 { width: 560px; height: 560px; transform: translate(-50%,-50%) rotate(-18deg) scaleY(0.40); }
  .orbit.o2 { width: 430px; height: 430px; transform: translate(-50%,-50%) rotate(34deg) scaleY(0.42); border-color: rgba(92,144,255,0.32); }
  .orbit.o3 { width: 320px; height: 320px; transform: translate(-50%,-50%) rotate(-52deg) scaleY(0.44); }
  .art .core { position: absolute; left: 50%; top: 48%; transform: translate(-50%,-50%); width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle at 34% 28%, #ffffff 0%, #93B4FF 36%, #0A5BFF 76%, #0742C2 100%);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.3), 0 36px 90px -16px rgba(10,91,255,0.9), inset 0 -18px 40px rgba(7,66,194,0.6), inset 10px 14px 30px rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center; }
  .art .core img { width: 46%; filter: drop-shadow(0 4px 12px rgba(7,66,194,0.5)); }
  /* glowing nodes riding the orbits */
  .bead { position: absolute; border-radius: 50%; background: radial-gradient(circle at 34% 30%, #fff, #5C90FF 52%, #0A5BFF); box-shadow: 0 0 0 5px rgba(92,144,255,0.16), 0 8px 20px -4px rgba(10,91,255,0.8); }
  .bead.alt { background: radial-gradient(circle at 34% 30%, #fff, #C5D6FF 48%, #2E3CB0); }
  /* frosted note cards */
  .note { position: absolute; border-radius: 20px; background: rgba(255,255,255,0.13); border: 1px solid rgba(255,255,255,0.26);
    box-shadow: 0 26px 56px -18px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.5);
    backdrop-filter: blur(13px); -webkit-backdrop-filter: blur(13px); padding: 15px; }
  .note.n1 { left: -2%; top: 16%; width: 158px; display: flex; align-items: center; gap: 11px; transform: rotate(-5deg); }
  .note.n1 .lines { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .note.n2 { right: -1%; bottom: 17%; width: 170px; display: flex; flex-direction: column; gap: 9px; transform: rotate(4deg); }
  .miniorb { width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle at 34% 30%, #fff, #5C90FF 55%, #0A5BFF); box-shadow: 0 6px 14px -3px rgba(10,91,255,0.7); flex: none; }
  .bar { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div class="thumb">
  <div class="grid-tex"></div>
  <span class="dot" style="left:8%;top:24%;width:6px;height:6px;"></span>
  <span class="dot" style="left:14%;top:78%;width:8px;height:8px;opacity:.6;"></span>
  <span class="dot" style="left:50%;top:14%;width:5px;height:5px;opacity:.5;"></span>

  <!-- illustration: glass orbital knowledge system -->
  <div class="art">
    <div class="glow-pod"></div>
    <div class="orbit o1"></div>
    <div class="orbit o2"></div>
    <div class="orbit o3"></div>
    <span class="bead" style="left:3%;top:40%;width:30px;height:30px;"></span>
    <span class="bead alt" style="right:6%;top:34%;width:22px;height:22px;"></span>
    <span class="bead" style="left:32%;top:8%;width:16px;height:16px;"></span>
    <span class="bead alt" style="right:26%;bottom:12%;width:26px;height:26px;"></span>
    <span class="bead" style="left:20%;bottom:18%;width:14px;height:14px;"></span>
    <div class="core"><img src="../assets/logo/mark-white.png" alt=""></div>
    <div class="note n1"><span class="miniorb"></span><div class="lines"><span class="bar" style="width:100%;"></span><span class="bar" style="width:55%;opacity:.6;"></span></div></div>
    <div class="note n2">
      <span class="bar" style="width:70%;"></span>
      <span class="bar" style="width:100%;opacity:.6;"></span>
      <span class="bar" style="width:42%;background:rgba(46,114,255,0.85);"></span>
    </div>
  </div>

  <div class="pad">
    <div class="brandrow">
      <img src="../assets/logo/lockup-white.png" alt="Avanix">
      <span class="brand-sep"></span>
      <span class="module-tag">Lộ trình nền tảng</span>
    </div>

    <div class="center">
      <span class="eyebrow"><span class="pip"></span>NHẬP MÔN</span>
      <h1>Phương Pháp<br><span class="accent">Học Tập</span></h1>
      <p class="sub">Cách học với AI hiệu quả: ghi chú, hệ thống hoá kiến thức và thực hành để nhớ lâu, làm được thật.</p>
      <div class="chiprow">
        <span class="chip"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H11v15H5.5A1.5 1.5 0 0 0 4 20.5v-15Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M20 5.5A1.5 1.5 0 0 0 18.5 4H13v15h5.5a1.5 1.5 0 0 1 1.5 1.5v-15Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></span>6 bài học</span>
        <span class="chip"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.2" stroke="currentColor" stroke-width="1.8"/><path d="M12 7.5V12l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Cơ bản</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
