<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  .thumb {
    position: relative;
    width: 1460px;
    height: 752px;
    overflow: hidden;
    font-family: var(--font-body);
    background:
      radial-gradient(70% 120% at 80% 10%, #1a2a7a 0%, transparent 55%),
      radial-gradient(90% 130% at 90% 34%, rgba(46,114,255,0.42) 0%, transparent 50%),
      radial-gradient(120% 120% at 18% 100%, #0B1240 0%, #06091F 70%);
  }
  .grid-tex {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(80% 80% at 30% 40%, #000 0%, transparent 75%);
    -webkit-mask-image: radial-gradient(80% 80% at 30% 40%, #000 0%, transparent 75%);
  }
  .dot { position: absolute; border-radius: 999px; background: var(--av-blue-300); box-shadow: 0 0 10px var(--av-blue-400); }

  .pad { position: absolute; inset: 0; padding: 72px 80px; box-sizing: border-box; display: flex; flex-direction: column; }

  .brandrow { display: flex; align-items: center; gap: 14px; }
  .brandrow img { height: 38px; }
  .brand-sep { width: 1px; height: 26px; background: rgba(255,255,255,0.18); }
  .module-tag {
    font-size: 15px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--av-blue-300);
  }

  .center { flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 780px; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px; align-self: flex-start;
    padding: 9px 18px; border-radius: 999px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.16);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 28px; white-space: nowrap;
  }
  .eyebrow .pip { width: 9px; height: 9px; border-radius: 999px; background: var(--av-blue-400); box-shadow: 0 0 0 4px rgba(92,144,255,0.25); }
  h1 {
    font-family: var(--font-display); font-weight: 800;
    font-size: 104px; line-height: 1.06; letter-spacing: -0.03em;
    color: #fff; margin: 0;
  }
  h1 .accent { color: var(--av-blue-400); }
  .sub { font-size: 24px; line-height: 1.5; color: var(--av-slate-300); margin: 28px 0 0; max-width: 620px; }
  .chiprow { display: flex; gap: 12px; margin-top: 38px; }
  .chip {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 11px 20px; border-radius: 999px; font-size: 17px; font-weight: 600;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16);
    color: #fff; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); white-space: nowrap;
  }
  .chip .ic { color: var(--av-blue-400); display: flex; }

  /* ---- liquid-glass illustration: neural mind-map ---- */
  .art { position: absolute; right: -20px; top: 50%; transform: translateY(-50%); width: 660px; height: 660px; }
  .art .glow-pod { position: absolute; left: 50%; top: 48%; transform: translate(-50%,-50%); width: 470px; height: 470px; border-radius: 50%; background: radial-gradient(closest-side, rgba(46,114,255,0.5), transparent 72%); filter: blur(24px); }

  /* connecting links radiate from the core */
  .link { position: absolute; left: 330px; top: 317px; height: 2px; transform-origin: 0 50%;
    background: linear-gradient(90deg, rgba(147,180,255,0.65), rgba(147,180,255,0)); }

  /* glass thought nodes */
  .node { position: absolute; transform: translate(-50%,-50%); border-radius: 50%;
    background: radial-gradient(circle at 34% 30%, #fff, #5C90FF 52%, #0A5BFF);
    box-shadow: 0 0 0 5px rgba(92,144,255,0.16), 0 10px 22px -4px rgba(10,91,255,0.8); }
  .node.alt { background: radial-gradient(circle at 34% 30%, #fff, #C5D6FF 48%, #2E3CB0); }
  .node.glass { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 10px 24px -6px rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

  .art .core { position: absolute; left: 50%; top: 48%; transform: translate(-50%,-50%); width: 150px; height: 150px; border-radius: 50%;
    background: radial-gradient(130% 130% at 33% 23%, rgba(255,255,255,0.52) 0%, rgba(214,228,255,0.22) 40%, rgba(120,150,210,0.10) 72%, rgba(40,70,140,0.16) 100%);
    border: 1px solid rgba(255,255,255,0.50);
    box-shadow: inset 0 5px 12px rgba(255,255,255,0.70), inset 0 -17px 32px rgba(8,28,90,0.55), inset 0 0 24px rgba(146,180,255,0.28), 0 32px 64px -18px rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center; }
  .art .core::after { content: ""; position: absolute; left: 22%; top: 11%; width: 40%; height: 26%; border-radius: 50%; background: radial-gradient(closest-side, rgba(255,255,255,0.95), transparent 80%); pointer-events: none; }
  .art .core .logo { width: 70%; height: 70%; }

  /* AI tool logos in 3D liquid-glass orbs (translucent, capture-safe) */
  .logo-chip { position: absolute; transform: translate(-50%,-50%); width: 68px; height: 68px; border-radius: 50%;
    background: radial-gradient(130% 130% at 33% 23%, rgba(255,255,255,0.50) 0%, rgba(214,228,255,0.20) 40%, rgba(120,150,210,0.10) 72%, rgba(40,70,140,0.16) 100%);
    border: 1px solid rgba(255,255,255,0.45);
    box-shadow: inset 0 4px 9px rgba(255,255,255,0.70), inset 0 -13px 24px rgba(8,28,90,0.55),
      inset 0 0 18px rgba(146,180,255,0.25), 0 24px 44px -14px rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 800; font-size: 18px; color: #fff; letter-spacing: -0.02em;
    text-shadow: 0 1px 7px rgba(7,24,72,0.55); }
  .logo-chip::before { content: ""; position: absolute; left: 17%; top: 7%; width: 58%; height: 34%; border-radius: 50%;
    background: radial-gradient(closest-side, rgba(255,255,255,0.92), rgba(255,255,255,0) 80%); pointer-events: none; }
  .logo-chip.lg { width: 84px; height: 84px; font-size: 23px; }
  .logo-chip img { position: relative; width: 60%; height: 60%; object-fit: contain; }
  .logo-chip .mono { position: relative; }
  .logo { position: relative; width: 74%; height: 74%; border-radius: 50%; background: #fff;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.08), 0 3px 9px rgba(7,24,72,0.30); }
  .logo img { width: 66%; height: 66%; object-fit: contain; display: block; }
  .logo-chip .lab { position: absolute; top: calc(100% + 7px); left: 50%; transform: translateX(-50%); white-space: nowrap;
    font-size: 13px; font-weight: 600; color: var(--av-slate-300); }
</style>
</head>
<body>
<div class="thumb">
  <div class="grid-tex"></div>
  <span class="dot" style="left:8%;top:24%;width:6px;height:6px;"></span>
  <span class="dot" style="left:13%;top:80%;width:8px;height:8px;opacity:.6;"></span>
  <span class="dot" style="left:48%;top:13%;width:5px;height:5px;opacity:.5;"></span>

  <!-- illustration: glass neural mind-map -->
  <div class="art">
    <div class="glow-pod"></div>

    <!-- links from hub to each tool -->
    <span class="link" style="width:150px; transform: rotate(-90deg);"></span>
    <span class="link" style="width:150px; transform: rotate(150deg);"></span>
    <span class="link" style="width:150px; transform: rotate(30deg);"></span>
    <span class="link" style="width:270px; transform: rotate(-160deg);"></span>
    <span class="link" style="width:270px; transform: rotate(-100deg);"></span>
    <span class="link" style="width:270px; transform: rotate(-40deg);"></span>
    <span class="link" style="width:270px; transform: rotate(40deg);"></span>
    <span class="link" style="width:270px; transform: rotate(100deg);"></span>
    <span class="link" style="width:270px; transform: rotate(160deg);"></span>

    <!-- glass hub: Claude -->
    <div class="core"><span class="logo"><img src="../assets/logos-ai/claude.svg" alt="Claude"></span></div>

    <!-- AI tool chips: each logo on a white disc inside the glass orb -->
    <div class="logo-chip lg" style="left:330px; top:167px;"><span class="logo"><img src="../assets/logos-ai/chatgpt-openai.svg" alt="ChatGPT"></span><span class="lab">ChatGPT</span></div>
    <div class="logo-chip lg" style="left:200px; top:392px;"><span class="logo"><img src="../assets/logos-ai/n8n.svg" alt="n8n"></span><span class="lab">n8n</span></div>
    <div class="logo-chip lg" style="left:460px; top:392px;"><span class="logo"><img src="../assets/logos-ai/gemini.svg" alt="Gemini"></span><span class="lab">Gemini</span></div>
    <div class="logo-chip" style="left:76px; top:225px;"><span class="logo"><img src="../assets/logos-ai/grok.svg" alt="Grok"></span><span class="lab">Grok</span></div>
    <div class="logo-chip" style="left:283px; top:51px;"><span class="logo"><img src="../assets/logos-ai/perplexity.svg" alt="Perplexity"></span><span class="lab">Perplexity</span></div>
    <div class="logo-chip" style="left:537px; top:143px;"><span class="logo"><img src="../assets/logos-ai/seedance.png" alt="Seedance"></span><span class="lab">Seedance</span></div>
    <div class="logo-chip" style="left:537px; top:491px;"><span class="logo"><img src="../assets/logos-ai/higgsfield.png" alt="Higgsfield"></span><span class="lab">Higgsfield</span></div>
    <div class="logo-chip" style="left:283px; top:583px;"><span class="logo"><img src="../assets/logos-ai/kling.png" alt="Kling"></span><span class="lab">Kling</span></div>
    <div class="logo-chip" style="left:76px; top:409px;"><span class="logo"><img src="../assets/logos-ai/magnific.png" alt="Magnific"></span><span class="lab">Magnific</span></div>
  </div>

  <div class="pad">
    <div class="brandrow">
      <img src="../assets/logo/lockup-white.png" alt="Avanix">
      <span class="brand-sep"></span>
      <span class="module-tag">Lộ trình nền tảng</span>
    </div>

    <div class="center">
      <span class="eyebrow"><span class="pip"></span>TƯ DUY KHÔNG THỂ THIẾU</span>
      <h1>Mindset<br><span class="accent">làm việc với AI</span></h1>
      <p class="sub">Coi AI là cộng sự: giao việc đúng cách, đặt câu hỏi sắc bén và luôn kiểm soát kết quả cuối cùng.</p>
      <div class="chiprow">
        <span class="chip"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3c-3.6 0-6 2.4-6 5.6 0 1.8.9 3.2 2 4.2.7.7 1 1.3 1 2.2v.5h6v-.5c0-.9.3-1.5 1-2.2 1.1-1 2-2.4 2-4.2C18 5.4 15.6 3 12 3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9.5 21h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>5 bài học</span>
        <span class="chip"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.2" stroke="currentColor" stroke-width="1.8"/><path d="M12 7.5V12l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Cơ bản</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
