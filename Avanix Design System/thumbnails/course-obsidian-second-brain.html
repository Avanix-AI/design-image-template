<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  .thumb {
    position: relative; width: 1460px; height: 752px; overflow: hidden;
    font-family: var(--font-body);
    background:
      radial-gradient(58% 80% at 76% 50%, rgba(10,91,255,0.16) 0%, transparent 60%),
      radial-gradient(120% 120% at 50% 0%, #FBFCFF 0%, #EDF1FB 46%, #E4E9F7 100%);
  }
  .grid-tex {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(11,18,64,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(11,18,64,0.05) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(78% 80% at 72% 48%, #000 0%, transparent 74%);
    -webkit-mask-image: radial-gradient(78% 80% at 72% 48%, #000 0%, transparent 74%);
  }
  /* floating bokeh — ethereal depth */
  .bokeh { position: absolute; border-radius: 999px; filter: blur(2px);
    background: radial-gradient(closest-side, rgba(92,144,255,0.55), rgba(92,144,255,0)); }

  .pad { position: absolute; inset: 0; padding: 72px 80px; box-sizing: border-box; display: flex; flex-direction: column; }
  .brandrow { display: flex; align-items: center; gap: 14px; }
  .brandrow img { height: 38px; }
  .brand-sep { width: 1px; height: 26px; background: rgba(11,18,64,0.16); }
  .module-tag { font-size: 15px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--av-blue-600); }

  .center { flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 720px; position: relative; z-index: 3; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px; align-self: flex-start;
    padding: 9px 18px; border-radius: 999px;
    background: rgba(10,91,255,0.07); border: 1px solid rgba(10,91,255,0.22);
    font-size: 16px; font-weight: 700; color: var(--av-blue-700); margin-bottom: 28px; white-space: nowrap; letter-spacing: 0.04em;
  }
  .eyebrow .pip { width: 9px; height: 9px; border-radius: 999px; background: var(--av-blue-600); box-shadow: 0 0 0 4px rgba(10,91,255,0.18); }
  h1 { font-family: var(--font-display); font-weight: 800; font-size: 96px; line-height: 1.05; letter-spacing: -0.03em; color: var(--av-navy-900); margin: 0; }
  h1 .accent { color: var(--av-blue-600); }
  .sub { font-size: 23px; line-height: 1.5; color: var(--av-slate-600); margin: 26px 0 0; max-width: 560px; }
  .chiprow { display: flex; gap: 12px; margin-top: 36px; }
  .chip {
    display: inline-flex; align-items: center; gap: 9px; padding: 11px 20px; border-radius: 999px; font-size: 17px; font-weight: 600;
    background: rgba(255,255,255,0.8); border: 1px solid #fff; color: var(--av-navy-900); box-shadow: var(--shadow-sm); white-space: nowrap;
  }
  .chip .ic { color: var(--av-blue-600); display: flex; }

  /* ---- node graph illustration ---- */
  .art { position: absolute; right: -6px; top: 50%; transform: translateY(-50%); width: 700px; height: 700px; z-index: 1; }
  .art svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
  .art .corehalo { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 460px; height: 460px; border-radius: 50%;
    background: radial-gradient(closest-side, rgba(46,114,255,0.30), transparent 70%); filter: blur(26px); }

  .logo-node { position: absolute; left: 350px; top: 350px; transform: translate(-50%,-50%); width: 132px; height: 132px; border-radius: 50%;
    background: radial-gradient(130% 130% at 32% 24%, #ffffff 0%, #EaF0FF 54%, #C5D6FF 100%);
    box-shadow: 0 30px 60px -16px rgba(10,91,255,0.45), 0 0 0 10px rgba(10,91,255,0.06), inset 0 4px 10px rgba(255,255,255,0.95), inset 0 -14px 28px rgba(120,160,255,0.45), inset 0 0 0 1px rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center; }
  .logo-node::after { content:""; position:absolute; left:20%; top:9%; width:46%; height:30%; border-radius:50%; background: radial-gradient(closest-side, rgba(255,255,255,0.95), transparent 80%); }
  .logo-node img { width: 58%; height: 58%; object-fit: contain; }

  .nlabel { position: absolute; transform: translate(-50%,-50%); padding: 8px 15px; border-radius: 999px;
    background: rgba(255,255,255,0.86); border: 1px solid #fff; backdrop-filter: blur(6px);
    box-shadow: 0 14px 30px -12px rgba(11,18,64,0.28), inset 0 1px 0 #fff; white-space: nowrap;
    font-size: 16px; font-weight: 800; color: var(--av-navy-900); letter-spacing: -0.01em; z-index: 4;
    display: inline-flex; align-items: center; gap: 8px; }
  .nlabel .d { width: 8px; height: 8px; border-radius: 999px; background: var(--av-blue-600); box-shadow: 0 0 0 4px rgba(10,91,255,0.16); }
</style>
</head>
<body>
<div class="thumb">
  <div class="grid-tex"></div>

  <span class="bokeh" style="left:60%;top:14%;width:150px;height:150px;opacity:.5;"></span>
  <span class="bokeh" style="left:90%;top:62%;width:200px;height:200px;opacity:.45;"></span>
  <span class="bokeh" style="left:66%;top:86%;width:120px;height:120px;opacity:.4;"></span>

  <div class="art">
    <div class="corehalo"></div>
    <svg viewBox="0 0 700 700" fill="none">
      <defs>
        <radialGradient id="nodeG" cx="34%" cy="26%" r="80%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="55%" stop-color="#E6EEFF"/>
          <stop offset="100%" stop-color="#9BB6FF"/>
        </radialGradient>
        <radialGradient id="nodeA" cx="34%" cy="26%" r="85%">
          <stop offset="0%" stop-color="#5C90FF"/>
          <stop offset="100%" stop-color="#0A5BFF"/>
        </radialGradient>
        <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="soft" x="-120%" y="-120%" width="340%" height="340%">
          <feGaussianBlur stdDeviation="9"/>
        </filter>
      </defs>

      <!-- back depth layer: blurred dim nodes -->
      <g filter="url(#soft)" opacity="0.5">
        <circle cx="250" cy="96" r="9" fill="#5C90FF"/>
        <circle cx="588" cy="84" r="12" fill="#5C90FF"/>
        <circle cx="636" cy="446" r="11" fill="#5C90FF"/>
        <circle cx="150" cy="612" r="10" fill="#5C90FF"/>
        <circle cx="70" cy="440" r="9" fill="#5C90FF"/>
      </g>

      <!-- edges -->
      <g stroke="#2E72FF" stroke-width="1.6" opacity="0.30" stroke-linecap="round">
        <path d="M350 350 L188 196"/>
        <path d="M350 350 L506 178"/>
        <path d="M350 350 L560 358"/>
        <path d="M350 350 L472 532"/>
        <path d="M350 350 L196 506"/>
        <path d="M350 350 L146 332"/>
        <path d="M350 350 L342 168"/>
        <path d="M350 350 L338 540"/>
        <path d="M350 350 L250 318"/>
        <path d="M350 350 L446 316"/>
      </g>
      <g stroke="#5C90FF" stroke-width="1.4" opacity="0.22" stroke-linecap="round">
        <path d="M188 196 L106 132"/>
        <path d="M188 196 L262 100"/>
        <path d="M506 178 L588 88"/>
        <path d="M506 178 L626 246"/>
        <path d="M560 358 L630 250"/>
        <path d="M472 532 L632 444"/>
        <path d="M472 532 L540 606"/>
        <path d="M472 532 L386 624"/>
        <path d="M196 506 L162 612"/>
        <path d="M196 506 L78 444"/>
        <path d="M146 332 L72 224"/>
        <path d="M188 196 L342 168"/>
        <path d="M506 178 L560 358"/>
        <path d="M196 506 L146 332"/>
        <path d="M472 532 L338 540"/>
        <path d="M188 196 L146 332"/>
      </g>

      <!-- nodes -->
      <g filter="url(#glow)">
        <!-- outer small -->
        <circle cx="106" cy="132" r="10" fill="url(#nodeG)"/>
        <circle cx="262" cy="100" r="9"  fill="url(#nodeG)"/>
        <circle cx="588" cy="88"  r="12" fill="url(#nodeG)"/>
        <circle cx="626" cy="246" r="9"  fill="url(#nodeG)"/>
        <circle cx="632" cy="444" r="11" fill="url(#nodeG)"/>
        <circle cx="540" cy="606" r="9"  fill="url(#nodeG)"/>
        <circle cx="386" cy="624" r="8"  fill="url(#nodeG)"/>
        <circle cx="162" cy="612" r="10" fill="url(#nodeG)"/>
        <circle cx="78"  cy="444" r="9"  fill="url(#nodeG)"/>
        <circle cx="72"  cy="224" r="11" fill="url(#nodeG)"/>
        <circle cx="250" cy="318" r="8"  fill="url(#nodeA)"/>
        <circle cx="446" cy="316" r="8"  fill="url(#nodeA)"/>
        <!-- mid ring -->
        <circle cx="560" cy="358" r="18" fill="url(#nodeG)"/>
        <circle cx="146" cy="332" r="16" fill="url(#nodeG)"/>
        <circle cx="342" cy="168" r="14" fill="url(#nodeA)"/>
        <circle cx="338" cy="540" r="16" fill="url(#nodeG)"/>
        <!-- ring-1 (labeled) accent nodes -->
        <circle cx="188" cy="196" r="27" fill="url(#nodeA)"/>
        <circle cx="506" cy="178" r="25" fill="url(#nodeA)"/>
        <circle cx="472" cy="532" r="27" fill="url(#nodeA)"/>
        <circle cx="196" cy="506" r="25" fill="url(#nodeA)"/>
      </g>
    </svg>

    <div class="logo-node"><img src="../assets/logos-ai/obsidian.svg" alt="Obsidian"></div>

    <div class="nlabel" style="left:188px;top:150px;"><span class="d"></span>Ghi chú</div>
    <div class="nlabel" style="left:556px;top:166px;"><span class="d"></span>Liên kết</div>
    <div class="nlabel" style="left:516px;top:566px;"><span class="d"></span>Truy xuất</div>
    <div class="nlabel" style="left:148px;top:540px;"><span class="d"></span>LLM Wiki</div>
  </div>

  <div class="pad">
    <div class="brandrow">
      <img src="../assets/logo/lockup-navy.png" alt="Avanix">
      <span class="brand-sep"></span>
      <span class="module-tag">Lộ trình nền tảng</span>
    </div>

    <div class="center">
      <span class="eyebrow"><span class="pip"></span>NHẬP MÔN · LLM WIKI</span>
      <h1>Obsidian<br><span class="accent">Second Brain</span></h1>
      <p class="sub">Biến ghi chú thành bộ não thứ hai: liên kết tri thức, xây LLM Wiki và truy xuất — sáng tạo cùng AI.</p>
      <div class="chiprow">
        <span class="chip"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H11v15H5.5A1.5 1.5 0 0 0 4 20.5v-15Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M20 5.5A1.5 1.5 0 0 0 18.5 4H13v15h5.5a1.5 1.5 0 0 1 1.5 1.5v-15Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></span>8 bài học</span>
        <span class="chip"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.2" stroke="currentColor" stroke-width="1.8"/><path d="M12 7.5V12l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Cơ bản</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
