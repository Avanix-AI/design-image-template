<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  .thumb {
    position: relative;
    width: 1460px;
    height: 752px;
    overflow: hidden;
    font-family: var(--font-body);
    background:
      radial-gradient(75% 110% at 82% 8%, #ffffff 0%, transparent 55%),
      radial-gradient(90% 120% at 88% 26%, rgba(92,144,255,0.30) 0%, transparent 52%),
      radial-gradient(120% 130% at 18% 100%, #E9EEFA 0%, #DCE4F5 70%);
  }
  /* faint grid texture */
  .grid-tex {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(11,18,64,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(11,18,64,0.05) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(82% 82% at 70% 45%, #000 0%, transparent 76%);
    -webkit-mask-image: radial-gradient(82% 82% at 70% 45%, #000 0%, transparent 76%);
  }
  .dot { position: absolute; border-radius: 999px; background: var(--av-blue-400); box-shadow: 0 0 10px var(--av-blue-300); opacity: .5; }

  .pad { position: absolute; inset: 0; padding: 72px 80px; box-sizing: border-box; display: flex; flex-direction: column; }

  /* top brand row */
  .brandrow { display: flex; align-items: center; gap: 14px; }
  .brandrow img { height: 38px; }
  .brand-sep { width: 1px; height: 26px; background: rgba(11,18,64,0.16); }
  .module-tag { font-size: 15px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--av-blue-600); }

  /* main title block */
  .center { flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 760px; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px; align-self: flex-start;
    padding: 9px 18px; border-radius: 999px;
    background: rgba(10,91,255,0.07); border: 1px solid rgba(10,91,255,0.22);
    font-size: 16px; font-weight: 700; color: var(--av-blue-700); margin-bottom: 28px; white-space: nowrap;
    letter-spacing: 0.04em;
  }
  .eyebrow .pip { width: 9px; height: 9px; border-radius: 999px; background: var(--av-blue-600); box-shadow: 0 0 0 4px rgba(10,91,255,0.18); }
  h1 {
    font-family: var(--font-display); font-weight: 800;
    font-size: 102px; line-height: 1.05; letter-spacing: -0.03em;
    color: var(--av-navy-900); margin: 0;
  }
  h1 .accent { color: var(--av-blue-600); }
  .sub { font-size: 24px; line-height: 1.5; color: var(--av-slate-600); margin: 26px 0 0; max-width: 600px; }
  .chiprow { display: flex; gap: 12px; margin-top: 38px; }
  .chip {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 11px 20px; border-radius: 999px; font-size: 17px; font-weight: 600;
    background: rgba(255,255,255,0.8); border: 1px solid #fff;
    color: var(--av-navy-900); box-shadow: var(--shadow-sm); white-space: nowrap;
  }
  .chip .ic { color: var(--av-blue-600); display: flex; }

  /* ---- liquid-glass illustration (right): AI core + concept cards ---- */
  .art { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 660px; height: 660px; }
  .art .halo { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 440px; height: 440px; border-radius: 50%; background: radial-gradient(closest-side, rgba(92,144,255,0.35), transparent 72%); filter: blur(20px); }

  /* connector links from core to each card */
  .link { position: absolute; left: 330px; top: 330px; height: 2px; transform-origin: 0 50%;
    background: linear-gradient(90deg, rgba(10,91,255,0.40), rgba(10,91,255,0)); }

  /* central AI core: light glass shell + blue energy core */
  .core { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 196px; height: 196px; border-radius: 50%;
    background: radial-gradient(130% 130% at 32% 22%, #ffffff 0%, #eff4fe 52%, #d4e0f7 100%);
    box-shadow: 0 34px 70px -18px rgba(11,18,64,0.30), inset 0 5px 12px rgba(255,255,255,0.95), inset 0 -18px 34px rgba(120,150,210,0.40), inset 0 0 0 1px rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center; }
  .core::after { content: ""; position: absolute; left: 20%; top: 9%; width: 44%; height: 28%; border-radius: 50%; background: radial-gradient(closest-side, rgba(255,255,255,0.95), transparent 80%); pointer-events: none; }
  .core .energy { width: 104px; height: 104px; border-radius: 50%;
    background: radial-gradient(circle at 34% 28%, #ffffff 0%, #93B4FF 38%, #0A5BFF 80%, #0742C2 100%);
    box-shadow: 0 0 40px -4px rgba(10,91,255,0.75), inset 0 -10px 22px rgba(7,66,194,0.6), inset 8px 10px 20px rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center; }
  .core .energy img { width: 46%; filter: drop-shadow(0 3px 8px rgba(7,66,194,0.5)); }

  /* concept cards */
  .cc { position: absolute; transform: translate(-50%,-50%); width: 176px; padding: 14px 16px; border-radius: 18px;
    background: rgba(255,255,255,0.82); border: 1px solid #ffffff;
    box-shadow: 0 20px 44px -16px rgba(11,18,64,0.28), inset 0 1px 0 #fff;
    display: flex; align-items: center; gap: 12px; }
  .cc .ic { width: 38px; height: 38px; flex: none; border-radius: 11px; background: var(--av-blue-100); color: var(--av-blue-600);
    display: flex; align-items: center; justify-content: center; }
  .cc .t { font-size: 16px; font-weight: 800; color: var(--av-navy-900); line-height: 1.15; letter-spacing: -0.01em; }
  .cc .t small { display: block; font-size: 12px; font-weight: 500; color: var(--av-slate-500); letter-spacing: 0; margin-top: 2px; }
</style>
</head>
<body>
<div class="thumb">
  <div class="grid-tex"></div>
  <span class="dot" style="left:10%;top:26%;width:7px;height:7px;"></span>
  <span class="dot" style="left:16%;top:78%;width:9px;height:9px;"></span>
  <span class="dot" style="left:52%;top:14%;width:6px;height:6px;"></span>

  <!-- illustration -->
  <div class="art">
    <div class="halo"></div>

    <span class="link" style="width:254px; transform: rotate(-135deg);"></span>
    <span class="link" style="width:254px; transform: rotate(-45deg);"></span>
    <span class="link" style="width:254px; transform: rotate(135deg);"></span>
    <span class="link" style="width:254px; transform: rotate(45deg);"></span>

    <div class="core"><div class="energy"><img src="../assets/logo/mark-white.png" alt=""></div></div>

    <!-- Cơ chế (top-left) -->
    <div class="cc" style="left:150px; top:150px;">
      <span class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 13a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.82 1.17V20a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 7 18.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 2.6 13H2.5a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.2 8a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 3.6V3.5a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 16 5.2a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 20.4 11h.1a2 2 0 1 1 0 4h-.1Z" stroke="currentColor" stroke-width="1.4"/></svg></span>
      <div class="t">Cơ chế<small>AI hoạt động ra sao</small></div>
    </div>

    <!-- Giới hạn (top-right) -->
    <div class="cc" style="left:512px; top:150px;">
      <span class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.8"/><path d="M6 6l12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
      <div class="t">Giới hạn<small>Điều AI chưa làm được</small></div>
    </div>

    <!-- Ưu điểm (bottom-left) -->
    <div class="cc" style="left:150px; top:512px;">
      <span class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 4l2.3 4.9 5.2.6-3.9 3.6 1.1 5.3L12 16.9 7.3 18.4l1.1-5.3L4.5 9.5l5.2-.6L12 4Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg></span>
      <div class="t">Ưu điểm<small>Sức mạnh nổi bật</small></div>
    </div>

    <!-- Nhược điểm (bottom-right) -->
    <div class="cc" style="left:512px; top:512px;">
      <span class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 3.5 21 19H3L12 3.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M12 10v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="16.6" r="1" fill="currentColor"/></svg></span>
      <div class="t">Nhược điểm<small>Rủi ro cần biết</small></div>
    </div>
  </div>

  <div class="pad">
    <div class="brandrow">
      <img src="../assets/logo/lockup-navy.png" alt="Avanix">
      <span class="brand-sep"></span>
      <span class="module-tag">Lộ trình nền tảng</span>
    </div>

    <div class="center">
      <span class="eyebrow"><span class="pip"></span>BẢN CHẤT AI</span>
      <h1>AI Foundation<br><span class="accent">Hiểu từ gốc</span></h1>
      <p class="sub">Bản chất, cơ chế hoạt động, giới hạn và điểm mạnh–yếu của AI — nền tảng để dùng AI đúng cách.</p>
      <div class="chiprow">
        <span class="chip"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H11v15H5.5A1.5 1.5 0 0 0 4 20.5v-15Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M20 5.5A1.5 1.5 0 0 0 18.5 4H13v15h5.5a1.5 1.5 0 0 1 1.5 1.5v-15Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></span>6 bài học</span>
        <span class="chip"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.2" stroke="currentColor" stroke-width="1.8"/><path d="M12 7.5V12l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Cơ bản</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
